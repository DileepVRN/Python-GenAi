version: "3.8"

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  gateway-service:
    build: ./gateway-service
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - account-service
      - transaction-service

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    depends_on:
      - mysql

  account-service:
    build: ./account-service
    ports:
      - "8002:8002"
    depends_on:
      - mysql
      - kafka
      - auth-service

  transaction-service:
    build: ./transaction-service
    ports:
      - "8003:8003"
    depends_on:
      - mysql
      - kafka
      - auth-service